<h2 mat-dialog-title>{{ data.mode === 'create' ? 'Nuevo detalle' : 'Editar detalle' }}</h2>
<mat-dialog-content class="dialog-body">
  <form [formGroup]="form" class="grid">
    <mat-form-field appearance="outline" class="span-2">
      <mat-label>Pedido</mat-label>
      <mat-select formControlName="id_pedido">
        @for (p of pedidos(); track p.id_pedido) {
          <mat-option [value]="p.id_pedido">{{ p.nombre }} ({{ p.id_pedido.slice(0, 8) }}…)</mat-option>
        }
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline" class="span-2">
      <mat-label>Producto</mat-label>
      <mat-select formControlName="id_producto">
        @for (p of productos(); track p.id_producto) {
          <mat-option [value]="p.id_producto">{{ p.nombre }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline" class="span-2">
      <mat-label>Nombre línea</mat-label>
      <input matInput formControlName="nombre" />
    </mat-form-field>
    <mat-form-field appearance="outline" class="span-2">
      <mat-label>Descripción</mat-label>
      <textarea matInput rows="2" formControlName="descripcion"></textarea>
    </mat-form-field>
    <mat-form-field appearance="outline" class="span-2">
      <mat-label>Estado</mat-label>
      <input matInput formControlName="estado" />
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">Cancelar</button>
  <button mat-flat-button color="primary" type="button" (click)="save()">Guardar</button>
</mat-dialog-actions>
