<h2 mat-dialog-title>{{ data.mode === 'create' ? 'Nuevo pedido' : 'Editar pedido' }}</h2>
<mat-dialog-content class="dialog-body">
  <form [formGroup]="form" class="grid">
    <mat-form-field appearance="outline" class="span-2">
      <mat-label>Usuario del pedido</mat-label>
      <mat-select formControlName="id_usuario">
        @for (u of usuarios(); track u.id_usuario) {
          <mat-option [value]="u.id_usuario">{{ u.nombre_usuario }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline" class="span-2">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="nombre" />
    </mat-form-field>
    <mat-form-field appearance="outline" class="span-2">
      <mat-label>Descripción</mat-label>
      <textarea matInput rows="2" formControlName="descripcion"></textarea>
    </mat-form-field>
    <mat-form-field appearance="outline" class="span-2">
      <mat-label>Estado</mat-label>
      <input matInput formControlName="estado" />
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">Cancelar</button>
  <button mat-flat-button color="primary" type="button" (click)="save()">Guardar</button>
</mat-dialog-actions>
